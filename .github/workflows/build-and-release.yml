name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: layerhost-linux.tar.gz
          - os: macos-14
            artifact-name: layerhost-macos.zip
          - os: windows-latest
            artifact-name: layerhost-windows.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Linux dependencies
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libsysfs-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

      # Configure CMake
      - name: Configure CMake (macOS)
        if: matrix.os == 'macos-14'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_FLAGS="-DGL_SILENCE_DEPRECATION=1"

      - name: Configure CMake (non-macOS)
        if: matrix.os != 'macos-14'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      # Build Project
      - name: Build
        run: cmake --build build --config Release --parallel 4

      # Package Linux Artifact
      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ -f build/layerhost_artefacts/Release/layerhost ]; then
            tar -czvf ${{ matrix.artifact-name }} -C build/layerhost_artefacts/Release layerhost
          elif [ -f build/layerhost_artefacts/layerhost ]; then
            tar -czvf ${{ matrix.artifact-name }} -C build/layerhost_artefacts layerhost
          else
            echo "Error: layerhost binary not found!"
            exit 1
          fi

      # Package macOS Artifact
      - name: Package macOS
        if: matrix.os == 'macos-14'
        run: |
          if [ -d build/layerhost_artefacts/Release/layerhost.app ]; then
            cd build/layerhost_artefacts/Release && zip -r ../../../${{ matrix.artifact-name }} layerhost.app
          elif [ -d build/layerhost_artefacts/layerhost.app ]; then
            cd build/layerhost_artefacts && zip -r ../../${{ matrix.artifact-name }} layerhost.app
          else
            echo "Error: layerhost.app not found!"
            exit 1
          fi

      # Package Windows Artifact
      - name: Package Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path "build/layerhost_artefacts/Release/layerhost.exe") {
            Compress-Archive -Path "build/layerhost_artefacts/Release/layerhost.exe" -DestinationPath "${{ matrix.artifact-name }}"
          } elseif (Test-Path "build/layerhost_artefacts/layerhost.exe") {
            Compress-Archive -Path "build/layerhost_artefacts/layerhost.exe" -DestinationPath "${{ matrix.artifact-name }}"
          } else {
            Write-Error "Error: layerhost.exe not found!"
            exit 1
          }

      # Upload Workflow Artifacts
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: layerhost-linux.tar.gz

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: layerhost-macos.zip

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: layerhost-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            layerhost-linux.tar.gz
            layerhost-macos.zip
            layerhost-windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
